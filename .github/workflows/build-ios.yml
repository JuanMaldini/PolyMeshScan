name: build-ios

on:
  workflow_dispatch:
  push:
    paths:
      - "app/**"
      - ".github/workflows/build-ios.yml"

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        # sin submodulos: la app v1 no depende de rtabmap (queda para pipeline/Fase 2)

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: app
        run: xcodegen generate

      - name: Build (sin firma — SideStore firma al instalar)
        run: |
          xcodebuild \
            -project app/PolyMeshScan.xcodeproj \
            -scheme PolyMeshScan \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package .ipa
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/PolyMeshScan.app Payload/
          zip -qr PolyMeshScan.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: PolyMeshScan-ipa
          path: PolyMeshScan.ipa
          retention-days: 14
