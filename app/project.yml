name: PolyMeshScan
options:
  bundleIdPrefix: cloud.vmoliver
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
targets:
  PolyMeshScan:
    type: application
    platform: iOS
    sources: [PolyMeshScan]
    info:
      path: PolyMeshScan/Info.plist
      properties:
        CFBundleDisplayName: PolyMeshScan
        UILaunchScreen: {}
        NSCameraUsageDescription: Se usa la camara y el LiDAR para escanear en 3D.
        UIRequiredDeviceCapabilities: [arkit]
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cloud.vmoliver.polymeshscan
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
